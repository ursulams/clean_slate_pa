name: Create release

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: "Release Type"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  bump_version:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/bump_version.yml
    secrets: inherit
    with:
      bump-type: ${{ github.event.inputs.bump-type }}

  create_release:
    runs-on: ubuntu-latest
    needs: bump_version
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump_version.outputs.tag-name }}
          generate_release_notes: true
